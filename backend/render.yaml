services:
  - type: web
    name: vedaai-backend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MINIMAX_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false